controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

# ── Differential drive ────────────────────────────────────────────────
diff_drive_controller:
  ros__parameters:
    left_wheel_names:  ['left_wheel_joint']
    right_wheel_names: ['right_wheel_joint']

    wheel_separation: 0.38   # distance between wheel centres (m) — matches mobile_base.urdf.xacro
    wheel_radius:     0.10   # wheel radius (m)

    publish_rate: 50.0
    odom_publish_frequency: 50.0
    enable_odom_tf: true

    cmd_vel_timeout: 0.5
    publish_limited_velocity: true

    base_frame_id:  base_footprint
    odom_frame_id:  odom

    linear.x.has_velocity_limits:     true
    linear.x.max_velocity:            0.5
    linear.x.min_velocity:           -0.5
    linear.x.has_acceleration_limits: true
    linear.x.max_acceleration:        1.0

    angular.z.has_velocity_limits:     true
    angular.z.max_velocity:            1.5
    angular.z.min_velocity:           -1.5
    angular.z.has_acceleration_limits: true
    angular.z.max_acceleration:        2.0

# ── Arm (joint_trajectory_controller) ────────────────────────────────
arm_controller:
  ros__parameters:
    joints:
      - joint0
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
    command_interfaces: [position]
    state_interfaces:   [position, velocity]
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    open_loop_control: false
    allow_integration_in_goal_trajectories: false
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0

# ── Gripper (single joint, trajectory controller) ─────────────────────
gripper_controller:
  ros__parameters:
    joints: [joint6]
    command_interfaces: [position]
    state_interfaces:   [position, velocity]
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    open_loop_control: false
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0
