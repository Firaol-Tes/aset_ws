# Joint limits for MoveIt planning (must stay within URDF hard limits).
# These are the URDF values; set has_velocity_limits / has_acceleration_limits
# to false here and let the trajectory controller enforce them.

joint_limits:
  joint0:
    has_velocity_limits: true
    max_velocity: 1.0
    has_acceleration_limits: true
    max_acceleration: 1.0
